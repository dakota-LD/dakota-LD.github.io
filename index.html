<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="LD Safety Solutions, Inc. connects safety-focused partners and products."
    >
    <title>LD Safety Solutions, Inc.</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <h1>LD Safety Solutions, Inc.</h1>

      <section class="listing" aria-labelledby="partners-title">
        <h2 id="partners-title">Partners</h2>

        <div class="logo-row">
          <a
            class="logo-link"
            href="https://oregonrms.com"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit ORMS at oregonrms.com"
          >
            <img src="assets/orms-logo.png" alt="ORMS logo">
            <span>ORMS</span>
          </a>

          <a
            class="logo-link"
            href="https://oregonrms.com"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit OFSS at oregonrms.com"
          >
            <img src="assets/ofss-logo.png" alt="OFSS logo">
            <span>OFSS</span>
          </a>
        </div>
      </section>

      <section class="listing" aria-labelledby="products-title">
        <h2 id="products-title">Products</h2>

        <div class="logo-row">
          <a
            class="logo-link oasis-link"
            href="https://oasissafetyapp.com"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit Oasis at oasissafetyapp.com"
          >
            <img src="assets/oasis-logo.png" alt="Oasis Safety App logo">
            <span>Oasis</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
